services:
  # Unified Web Service (Backend + Frontend)
  - type: web
    name: legal-ai-analyzer
    runtime: node
    buildCommand: npm install && cd backend && npm install
    startCommand: node backend/server.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this in Render dashboard
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

